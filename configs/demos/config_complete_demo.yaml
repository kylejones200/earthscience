# Alaska Gold - Complete End-to-End Demo
# 5,000 samples - optimized for completion

project:
  name: "Alaska Gold - Complete Pipeline Demo"
  output_dir: "./results/alaska_gold_complete"

data:
  input_file: "data/processed/alaska_au_5k.csv"
  x_column: "LONGITUDE"
  y_column: "LATITUDE"
  z_column: "Au_PPM"

preprocessing:
  remove_outliers: true
  outlier_method: "iqr"
  outlier_threshold: 3.0
  transform: "log"

variogram:
  n_lags: 12
  models:
    - spherical
    - exponential
  auto_fit: true

kriging:
  method: "ordinary"

  neighborhood:
    max_neighbors: 20
    min_neighbors: 5

  grid:
    x_min: -165.0
    x_max: -145.0
    y_min: 58.0
    y_max: 68.0
    resolution: 1.0

  compute_variance: true

validation:
  cross_validation: true
  n_folds: 3
  metrics:
    - rmse
    - mae
    - r2

visualization:
  style: "minimalist"
  plots:
    - variogram
    - kriging_map
    - variance_map
    - cross_validation
    - histogram
  colormap: "YlOrRd"
  dpi: 200

output:
  save_predictions: true
  save_variance: true
  save_plots: true
  save_report: true
  formats:
    - png
    - csv
