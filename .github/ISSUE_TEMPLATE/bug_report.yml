name: Bug report
description: Report incorrect behavior or a regression
title: "[bug]: "
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: Describe the bug and what you expected instead.
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Minimal reproduction
      description: Code snippet or steps to reproduce.
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: earthsciences version
      placeholder: "0.3.0 or git commit"
    validations:
      required: true
  - type: input
    id: python
    attributes:
      label: Python version
      placeholder: "3.12.x"
    validations:
      required: true
